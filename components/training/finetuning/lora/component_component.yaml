# PIPELINE DEFINITION
# Name: train-model
# Description: Train model using LoRA (Low-Rank Adaptation). Outputs model artifact and metrics.
# Inputs:
#    dataset: system.Dataset
#    kubernetes_config: TaskConfig
#    pvc_path: str
#    training_base_model: str [Default: 'Qwen/Qwen2.5-1.5B-Instruct']
#    training_bf16: bool
#    training_checkpoint_at_epoch: bool
#    training_data_output_dir: str
#    training_dataset_type: str
#    training_effective_batch_size: int [Default: 128.0]
#    training_enable_model_splitting: bool
#    training_envs: str [Default: '']
#    training_eval_steps: int
#    training_field_input: str
#    training_field_instruction: str
#    training_field_messages: str
#    training_field_output: str
#    training_flash_attention: bool
#    training_fp16: bool
#    training_gradient_accumulation_steps: int
#    training_learning_rate: float
#    training_logging_steps: int
#    training_lora_alpha: int [Default: 32.0]
#    training_lora_bnb_4bit_compute_dtype: str
#    training_lora_bnb_4bit_quant_type: str
#    training_lora_bnb_4bit_use_double_quant: bool
#    training_lora_dropout: float [Default: 0.0]
#    training_lora_load_in_4bit: bool
#    training_lora_load_in_8bit: bool
#    training_lora_r: int [Default: 16.0]
#    training_lora_sample_packing: bool
#    training_lora_target_modules: str [Default: '']
#    training_lora_use_dora: bool
#    training_lora_use_rslora: bool
#    training_lr_scheduler: str
#    training_lr_warmup_steps: int
#    training_max_seq_len: int [Default: 8192.0]
#    training_max_tokens_per_gpu: int [Default: 32000.0]
#    training_metadata_annotations: str [Default: '']
#    training_metadata_labels: str [Default: '']
#    training_micro_batch_size: int
#    training_mlflow_experiment_name: str
#    training_mlflow_run_name: str
#    training_mlflow_tracking_uri: str
#    training_num_epochs: int
#    training_resource_cpu_per_worker: str [Default: '4']
#    training_resource_gpu_per_worker: int [Default: 1.0]
#    training_resource_memory_per_worker: str [Default: '32Gi']
#    training_resource_num_procs_per_worker: str [Default: 'auto']
#    training_resource_num_workers: int [Default: 1.0]
#    training_save_steps: int
#    training_save_total_limit: int
#    training_seed: int
#    training_tensorboard_log_dir: str
#    training_tf32: bool
#    training_use_liger: bool
#    training_wandb_entity: str
#    training_wandb_project: str
#    training_wandb_run_name: str
# Outputs:
#    Output: str
#    output_loss_chart: system.HTML
#    output_metrics: system.Metrics
#    output_model: system.Model
components:
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Input training dataset artifact.
          isOptional: true
      parameters:
        kubernetes_config:
          description: KFP TaskConfig for volumes/env/resources passthrough.
          isOptional: true
          parameterType: TASK_CONFIG
        pvc_path:
          description: Workspace PVC root path (use dsl.WORKSPACE_PATH_PLACEHOLDER).
          parameterType: STRING
        training_base_model:
          defaultValue: Qwen/Qwen2.5-1.5B-Instruct
          description: Base model (HuggingFace ID or local path).
          isOptional: true
          parameterType: STRING
        training_bf16:
          description: Use bfloat16 precision.
          isOptional: true
          parameterType: BOOLEAN
        training_checkpoint_at_epoch:
          description: Save checkpoint at each epoch.
          isOptional: true
          parameterType: BOOLEAN
        training_data_output_dir:
          description: Directory for processed training data.
          isOptional: true
          parameterType: STRING
        training_dataset_type:
          description: Dataset format type.
          isOptional: true
          parameterType: STRING
        training_effective_batch_size:
          defaultValue: 128.0
          description: Effective batch size per optimizer step.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_enable_model_splitting:
          description: Enable model splitting across GPUs.
          isOptional: true
          parameterType: BOOLEAN
        training_envs:
          defaultValue: ''
          description: Environment overrides as KEY=VAL,KEY=VAL.
          isOptional: true
          parameterType: STRING
        training_eval_steps:
          description: Run evaluation every N steps.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_field_input:
          description: Field name for input in dataset.
          isOptional: true
          parameterType: STRING
        training_field_instruction:
          description: Field name for instruction in dataset.
          isOptional: true
          parameterType: STRING
        training_field_messages:
          description: Field name for messages in dataset.
          isOptional: true
          parameterType: STRING
        training_field_output:
          description: Field name for output in dataset.
          isOptional: true
          parameterType: STRING
        training_flash_attention:
          description: Enable flash attention.
          isOptional: true
          parameterType: BOOLEAN
        training_fp16:
          description: Use float16 precision.
          isOptional: true
          parameterType: BOOLEAN
        training_gradient_accumulation_steps:
          description: Gradient accumulation steps.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_learning_rate:
          description: 'Learning rate (default: 2e-4).'
          isOptional: true
          parameterType: NUMBER_DOUBLE
        training_logging_steps:
          description: Log metrics every N steps.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_lora_alpha:
          defaultValue: 32.0
          description: LoRA scaling factor.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_lora_bnb_4bit_compute_dtype:
          description: Compute dtype (e.g., "bfloat16"). Reserved for future support.
          isOptional: true
          parameterType: STRING
        training_lora_bnb_4bit_quant_type:
          description: Quantization type (e.g., "nf4"). Reserved for future training_hub
            support.
          isOptional: true
          parameterType: STRING
        training_lora_bnb_4bit_use_double_quant:
          description: Enable double quantization. Reserved for future training_hub
            support.
          isOptional: true
          parameterType: BOOLEAN
        training_lora_dropout:
          defaultValue: 0.0
          description: Dropout rate for LoRA layers.
          isOptional: true
          parameterType: NUMBER_DOUBLE
        training_lora_load_in_4bit:
          description: Enable 4-bit quantization (QLoRA).
          isOptional: true
          parameterType: BOOLEAN
        training_lora_load_in_8bit:
          description: Enable 8-bit quantization.
          isOptional: true
          parameterType: BOOLEAN
        training_lora_r:
          defaultValue: 16.0
          description: LoRA rank (controls model capacity).
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_lora_sample_packing:
          description: 'Pack multiple samples for efficiency (default: True in training_hub).'
          isOptional: true
          parameterType: BOOLEAN
        training_lora_target_modules:
          defaultValue: ''
          description: Comma-separated list of modules to apply LoRA (empty = auto-detect).
          isOptional: true
          parameterType: STRING
        training_lora_use_dora:
          description: Use Weight-Decomposed LoRA (DoRA).
          isOptional: true
          parameterType: BOOLEAN
        training_lora_use_rslora:
          description: Use Rank-Stabilized LoRA variant.
          isOptional: true
          parameterType: BOOLEAN
        training_lr_scheduler:
          description: 'LR scheduler type (cosine, linear, etc.). Training_hub default:
            linear.'
          isOptional: true
          parameterType: STRING
        training_lr_warmup_steps:
          description: Learning rate warmup steps.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_max_seq_len:
          defaultValue: 8192.0
          description: Max sequence length in tokens.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_max_tokens_per_gpu:
          defaultValue: 32000.0
          description: Max tokens per GPU (memory cap).
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_metadata_annotations:
          defaultValue: ''
          description: Pod annotations as key=value,key=value.
          isOptional: true
          parameterType: STRING
        training_metadata_labels:
          defaultValue: ''
          description: Pod labels as key=value,key=value.
          isOptional: true
          parameterType: STRING
        training_micro_batch_size:
          description: Micro batch size per GPU.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_mlflow_experiment_name:
          description: MLflow experiment name.
          isOptional: true
          parameterType: STRING
        training_mlflow_run_name:
          description: MLflow run name.
          isOptional: true
          parameterType: STRING
        training_mlflow_tracking_uri:
          description: MLflow tracking server URI.
          isOptional: true
          parameterType: STRING
        training_num_epochs:
          description: 'Number of training epochs (default: 3).'
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_resource_cpu_per_worker:
          defaultValue: '4'
          description: CPU cores per worker.
          isOptional: true
          parameterType: STRING
        training_resource_gpu_per_worker:
          defaultValue: 1.0
          description: GPUs per worker.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_resource_memory_per_worker:
          defaultValue: 32Gi
          description: Memory per worker (e.g., 32Gi).
          isOptional: true
          parameterType: STRING
        training_resource_num_procs_per_worker:
          defaultValue: auto
          description: Processes per worker (auto or int).
          isOptional: true
          parameterType: STRING
        training_resource_num_workers:
          defaultValue: 1.0
          description: Number of training pods.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_save_steps:
          description: Save checkpoint every N steps.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_save_total_limit:
          description: Max checkpoints to keep.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_seed:
          description: Random seed for reproducibility.
          isOptional: true
          parameterType: NUMBER_INTEGER
        training_tensorboard_log_dir:
          description: TensorBoard log directory.
          isOptional: true
          parameterType: STRING
        training_tf32:
          description: Enable TF32 on Ampere+ GPUs.
          isOptional: true
          parameterType: BOOLEAN
        training_use_liger:
          description: Enable Liger kernel optimizations.
          isOptional: true
          parameterType: BOOLEAN
        training_wandb_entity:
          description: Weights & Biases entity/team.
          isOptional: true
          parameterType: STRING
        training_wandb_project:
          description: Weights & Biases project name.
          isOptional: true
          parameterType: STRING
        training_wandb_run_name:
          description: Weights & Biases run name.
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_loss_chart:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
        output_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        output_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
    taskConfigPassthroughs:
    - field: RESOURCES
    - field: KUBERNETES_TOLERATIONS
    - field: KUBERNETES_NODE_SELECTOR
    - field: KUBERNETES_AFFINITY
    - applyToTask: true
      field: ENV
    - applyToTask: true
      field: KUBERNETES_VOLUMES
deploymentSpec:
  executors:
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes'\
          \ 'olot' 'matplotlib'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\n__KFP_EMBEDDED_ARCHIVE_B64 = ''\n\
          \nimport base64 as __kfp_b64\nimport io as __kfp_io\nimport os as __kfp_os\n\
          import sys as __kfp_sys\nimport tarfile as __kfp_tarfile\nimport tempfile\
          \ as __kfp_tempfile\n\n# Extract embedded archive at import time to ensure\
          \ sys.path and globals are set\n__kfp_tmpdir = __kfp_tempfile.TemporaryDirectory()\n\
          __KFP_EMBEDDED_ASSET_DIR = __kfp_tmpdir.name\ntry:\n    __kfp_bytes = __kfp_b64.b64decode(__KFP_EMBEDDED_ARCHIVE_B64.encode('ascii'))\n\
          \    with __kfp_tarfile.open(fileobj=__kfp_io.BytesIO(__kfp_bytes), mode='r:gz')\
          \ as __kfp_tar:\n        __kfp_tar.extractall(path=__KFP_EMBEDDED_ASSET_DIR)\n\
          except Exception as __kfp_e:\n    raise RuntimeError(f'Failed to extract\
          \ embedded archive: {__kfp_e}')\n\n# Always prepend the extracted directory\
          \ to sys.path for import resolution\nif __KFP_EMBEDDED_ASSET_DIR not in\
          \ __kfp_sys.path:\n    __kfp_sys.path.insert(0, __KFP_EMBEDDED_ASSET_DIR)\n\
          \n\n\n\ndef train_model(\n    pvc_path: str,\n    output_model: dsl.Output[dsl.Model],\n\
          \    output_metrics: dsl.Output[dsl.Metrics],\n    output_loss_chart: dsl.Output[dsl.HTML],\n\
          \    dataset: dsl.Input[dsl.Dataset] = None,\n    training_base_model: str\
          \ = \"Qwen/Qwen2.5-1.5B-Instruct\",\n    training_effective_batch_size:\
          \ int = 128,\n    training_max_tokens_per_gpu: int = 32000,\n    training_max_seq_len:\
          \ int = 8192,\n    training_learning_rate: Optional[float] = None,\n   \
          \ training_lr_warmup_steps: Optional[int] = None,\n    training_checkpoint_at_epoch:\
          \ Optional[bool] = None,\n    training_num_epochs: Optional[int] = None,\n\
          \    training_data_output_dir: Optional[str] = None,\n    training_envs:\
          \ str = \"\",\n    training_resource_cpu_per_worker: str = \"4\",\n    training_resource_gpu_per_worker:\
          \ int = 1,\n    training_resource_memory_per_worker: str = \"32Gi\",\n \
          \   training_resource_num_procs_per_worker: str = \"auto\",\n    training_resource_num_workers:\
          \ int = 1,\n    training_metadata_labels: str = \"\",\n    training_metadata_annotations:\
          \ str = \"\",\n    training_lora_r: int = 16,\n    training_lora_alpha:\
          \ int = 32,\n    training_lora_dropout: float = 0.0,\n    training_lora_target_modules:\
          \ str = \"\",\n    training_lora_use_rslora: Optional[bool] = None,\n  \
          \  training_lora_use_dora: Optional[bool] = None,\n    training_lora_load_in_4bit:\
          \ Optional[bool] = None,\n    training_lora_load_in_8bit: Optional[bool]\
          \ = None,\n    training_lora_bnb_4bit_quant_type: Optional[str] = None,\n\
          \    training_lora_bnb_4bit_compute_dtype: Optional[str] = None,\n    training_lora_bnb_4bit_use_double_quant:\
          \ Optional[bool] = None,\n    training_lora_sample_packing: Optional[bool]\
          \ = None,\n    training_seed: Optional[int] = None,\n    training_use_liger:\
          \ Optional[bool] = None,\n    training_lr_scheduler: Optional[str] = None,\n\
          \    # Batch params\n    training_micro_batch_size: Optional[int] = None,\n\
          \    training_gradient_accumulation_steps: Optional[int] = None,\n    #\
          \ Optimization params\n    training_flash_attention: Optional[bool] = None,\n\
          \    training_bf16: Optional[bool] = None,\n    training_fp16: Optional[bool]\
          \ = None,\n    training_tf32: Optional[bool] = None,\n    # Saving/Logging\
          \ params\n    training_save_steps: Optional[int] = None,\n    training_eval_steps:\
          \ Optional[int] = None,\n    training_logging_steps: Optional[int] = None,\n\
          \    training_save_total_limit: Optional[int] = None,\n    # Logging integration\
          \ params\n    training_wandb_project: Optional[str] = None,\n    training_wandb_entity:\
          \ Optional[str] = None,\n    training_wandb_run_name: Optional[str] = None,\n\
          \    training_tensorboard_log_dir: Optional[str] = None,\n    training_mlflow_tracking_uri:\
          \ Optional[str] = None,\n    training_mlflow_experiment_name: Optional[str]\
          \ = None,\n    training_mlflow_run_name: Optional[str] = None,\n    # Dataset\
          \ format params\n    training_dataset_type: Optional[str] = None,\n    training_field_messages:\
          \ Optional[str] = None,\n    training_field_instruction: Optional[str] =\
          \ None,\n    training_field_input: Optional[str] = None,\n    training_field_output:\
          \ Optional[str] = None,\n    # Multi-GPU params\n    training_enable_model_splitting:\
          \ Optional[bool] = None,\n    kubernetes_config: dsl.TaskConfig = None,\n\
          ) -> str:\n    \"\"\"Train model using LoRA (Low-Rank Adaptation). Outputs\
          \ model artifact and metrics.\n\n    Args:\n        pvc_path: Workspace\
          \ PVC root path (use dsl.WORKSPACE_PATH_PLACEHOLDER).\n        output_model:\
          \ Output model artifact.\n        output_metrics: Output training metrics\
          \ artifact.\n        output_loss_chart: Output HTML artifact with training\
          \ loss chart.\n        dataset: Input training dataset artifact.\n     \
          \   training_base_model: Base model (HuggingFace ID or local path).\n  \
          \      training_effective_batch_size: Effective batch size per optimizer\
          \ step.\n        training_max_tokens_per_gpu: Max tokens per GPU (memory\
          \ cap).\n        training_max_seq_len: Max sequence length in tokens.\n\
          \        training_learning_rate: Learning rate (default: 2e-4).\n      \
          \  training_lr_warmup_steps: Learning rate warmup steps.\n        training_checkpoint_at_epoch:\
          \ Save checkpoint at each epoch.\n        training_num_epochs: Number of\
          \ training epochs (default: 3).\n        training_data_output_dir: Directory\
          \ for processed training data.\n        training_envs: Environment overrides\
          \ as KEY=VAL,KEY=VAL.\n        training_resource_cpu_per_worker: CPU cores\
          \ per worker.\n        training_resource_gpu_per_worker: GPUs per worker.\n\
          \        training_resource_memory_per_worker: Memory per worker (e.g., 32Gi).\n\
          \        training_resource_num_procs_per_worker: Processes per worker (auto\
          \ or int).\n        training_resource_num_workers: Number of training pods.\n\
          \        training_metadata_labels: Pod labels as key=value,key=value.\n\
          \        training_metadata_annotations: Pod annotations as key=value,key=value.\n\
          \        training_lora_r: LoRA rank (controls model capacity).\n       \
          \ training_lora_alpha: LoRA scaling factor.\n        training_lora_dropout:\
          \ Dropout rate for LoRA layers.\n        training_lora_target_modules: Comma-separated\
          \ list of modules to apply LoRA (empty = auto-detect).\n        training_lora_use_rslora:\
          \ Use Rank-Stabilized LoRA variant.\n        training_lora_use_dora: Use\
          \ Weight-Decomposed LoRA (DoRA).\n        training_lora_load_in_4bit: Enable\
          \ 4-bit quantization (QLoRA).\n        training_lora_load_in_8bit: Enable\
          \ 8-bit quantization.\n        training_lora_bnb_4bit_quant_type: Quantization\
          \ type (e.g., \"nf4\"). Reserved for future training_hub support.\n    \
          \    training_lora_bnb_4bit_compute_dtype: Compute dtype (e.g., \"bfloat16\"\
          ). Reserved for future support.\n        training_lora_bnb_4bit_use_double_quant:\
          \ Enable double quantization. Reserved for future training_hub support.\n\
          \        training_lora_sample_packing: Pack multiple samples for efficiency\
          \ (default: True in training_hub).\n        training_seed: Random seed for\
          \ reproducibility.\n        training_use_liger: Enable Liger kernel optimizations.\n\
          \        training_lr_scheduler: LR scheduler type (cosine, linear, etc.).\
          \ Training_hub default: linear.\n        training_micro_batch_size: Micro\
          \ batch size per GPU.\n        training_gradient_accumulation_steps: Gradient\
          \ accumulation steps.\n        training_flash_attention: Enable flash attention.\n\
          \        training_bf16: Use bfloat16 precision.\n        training_fp16:\
          \ Use float16 precision.\n        training_tf32: Enable TF32 on Ampere+\
          \ GPUs.\n        training_save_steps: Save checkpoint every N steps.\n \
          \       training_eval_steps: Run evaluation every N steps.\n        training_logging_steps:\
          \ Log metrics every N steps.\n        training_save_total_limit: Max checkpoints\
          \ to keep.\n        training_wandb_project: Weights & Biases project name.\n\
          \        training_wandb_entity: Weights & Biases entity/team.\n        training_wandb_run_name:\
          \ Weights & Biases run name.\n        training_tensorboard_log_dir: TensorBoard\
          \ log directory.\n        training_mlflow_tracking_uri: MLflow tracking\
          \ server URI.\n        training_mlflow_experiment_name: MLflow experiment\
          \ name.\n        training_mlflow_run_name: MLflow run name.\n        training_dataset_type:\
          \ Dataset format type.\n        training_field_messages: Field name for\
          \ messages in dataset.\n        training_field_instruction: Field name for\
          \ instruction in dataset.\n        training_field_input: Field name for\
          \ input in dataset.\n        training_field_output: Field name for output\
          \ in dataset.\n        training_enable_model_splitting: Enable model splitting\
          \ across GPUs.\n        kubernetes_config: KFP TaskConfig for volumes/env/resources\
          \ passthrough.\n\n    Environment:\n        HF_TOKEN: HuggingFace token\
          \ for gated models (read from environment).\n        OCI_PULL_SECRET_MODEL_DOWNLOAD:\
          \ Docker config.json content for pulling OCI model images.\n    \"\"\"\n\
          \    import os\n    from typing import Dict\n\n    from data import download_oci_model,\
          \ prepare_jsonl, resolve_dataset\n    from output import persist_model,\
          \ plot_training_loss\n    from setup import configure_env, create_logger,\
          \ init_k8s, parse_kv, setup_hf_token\n    from training import compute_nproc,\
          \ select_runtime, wait_for_training_job\n\n    log = create_logger(\"train_model\"\
          )\n    log.info(f\"Initializing LoRA training component with: pvc={pvc_path},\
          \ model={training_base_model}\")\n\n    _api = init_k8s(log)\n\n    cache\
          \ = os.path.join(pvc_path, \".cache\", \"huggingface\")\n    default_env:\
          \ Dict[str, str] = {\n        \"XDG_CACHE_HOME\": \"/tmp\",\n        \"\
          TRITON_CACHE_DIR\": \"/tmp/.triton\",\n        \"HF_HOME\": \"/tmp/.cache/huggingface\"\
          ,\n        \"HF_DATASETS_CACHE\": os.path.join(cache, \"datasets\"),\n \
          \       \"TRANSFORMERS_CACHE\": os.path.join(cache, \"transformers\"),\n\
          \        \"NCCL_DEBUG\": \"INFO\",\n        \"PYTHONUNBUFFERED\": \"1\"\
          ,\n    }\n\n    merged_env = configure_env(training_envs, default_env, log)\n\
          \    setup_hf_token(merged_env, training_base_model, log)\n\n    ds_dir\
          \ = os.path.join(pvc_path, \"dataset\", \"train\")\n    os.makedirs(ds_dir,\
          \ exist_ok=True)\n\n    resolve_dataset(dataset, ds_dir, log)\n\n    jsonl\
          \ = os.path.join(ds_dir, \"train.jsonl\")\n    prepare_jsonl(ds_dir, jsonl,\
          \ log)\n\n    resolved = training_base_model\n\n    if isinstance(training_base_model,\
          \ str) and training_base_model.startswith(\"oci://\"):\n        resolved\
          \ = download_oci_model(training_base_model, pvc_path, log)\n\n    ckpt_dir\
          \ = os.path.join(pvc_path, \"checkpoints\")\n    os.makedirs(ckpt_dir, exist_ok=True)\n\
          \n    try:\n        from kubeflow.common.types import KubernetesBackendConfig\n\
